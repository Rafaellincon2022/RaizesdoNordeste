# ===============================================================
# CONFIGURAÇÕES GERAIS DA APLICAÇÃO
# ===============================================================
spring.application.name=raizes-do-nordeste-backend
server.port=${APP_PORT:8080}
spring.servlet.multipart.max-file-size=2MB

# ===============================================================
# BANCO DE DADOS (Persistência Real Obrigatória) [cite: 550]
# Preferir variáveis de ambiente (ver `.env.example`)
# ===============================================================
spring.datasource.url=${RAIZES_DB_URL:jdbc:mysql://localhost:3307/raizesdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${RAIZES_DB_USER:raizes}
spring.datasource.password=${RAIZES_DB_PASSWORD:raizes123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Flyway (migrations em `src/main/resources/db/migration`)
spring.flyway.enabled=${FLYWAY_ENABLED:true}

# ===============================================================
# SEGURANÇA E LGPD (Requisito Obrigatório) [cite: 325, 504]
# Configuração do JWT para Autenticação e Perfis (Roles)
# ===============================================================
# Chave secreta para assinatura do Token (Use uma string longa e segura)
api.security.token.secret=${JWT_SECRET:minha-chave-secreta-de-32-caracteres-pelo-menos}
# Tempo de expiração (ex: 2 horas em milissegundos)
api.security.token.expiration=7200000

# ===============================================================
# DOCUMENTAÇÃO DA API (Swagger/OpenAPI) [cite: 521, 557]
# ===============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===============================================================
# LOGS E AUDITORIA (Rastreabilidade de Ações Sensíveis) [cite: 413, 703]
# ===============================================================
logging.level.root=INFO
logging.level.com.raizesnordeste.api=DEBUG
# Caminho para salvar logs em arquivo (útil para auditoria da LGPD)
logging.file.name=logs/raizes-nordeste.log

# ===============================================================
# CONFIGURAÇÕES DE NEGÓCIO (Estudo de Caso)
# ===============================================================
# Mock de Pagamento Externo [cite: 398, 675]
pagamento.gateway.mock.url=http://api-simulada-pagamento.com
pagamento.gateway.timeout=5000

# Regras de Negócio: Fidelidade [cite: 396]
fidelidade.pontos.por-real=1
fidelidade.resgate.minimo=100